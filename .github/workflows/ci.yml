name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions: { contents: read }
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.11.0, run_install: false }
      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm schema:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: docker compose config
      - run: docker compose build
      - run: pnpm pack:build:dev && pnpm pack:verify
      - run: pnpm benchmark
      - run: pnpm docs:check
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: verification-evidence, path: "app/reports/**" }
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.11.0, run_install: false }
      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with: { name: playwright-failure, path: "app/playwright-report/**" }
  windows-package:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Build Windows distribution
        shell: pwsh
        run: ./app/scripts/package-windows-release.ps1
      - name: Verify packaged launcher and archive
        shell: pwsh
        run: |
          $required = @(
            "app/release/PharmAssist/약국 상담 도우미.exe",
            "app/release/PharmAssist/README.md",
            "app/release/PharmAssist/사용설명서.html",
            "app/release/PharmAssist-Windows.zip"
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path)) { throw "Missing package artifact: $path" }
            if ((Get-Item -LiteralPath $path).Length -le 0) { throw "Empty package artifact: $path" }
          }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: app/release/PharmAssist-Windows.zip
