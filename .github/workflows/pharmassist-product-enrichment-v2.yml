name: PharmAssist product enrichment v2 research

on:
  push:
    branches:
      - pharmassist-enrichment-tmp-20260714
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  research-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Fetch exact Health.kr codes and MFDS item records
        run: python3 scripts/pharmassist_research_v2.py
      - name: Upload verified research artifact
        uses: actions/upload-artifact@v4
        with:
          name: pharmassist-enrichment-research-v2
          path: pharmassist-output-v2/
          if-no-files-found: error
          retention-days: 1
