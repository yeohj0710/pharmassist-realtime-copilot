name: PharmAssist product enrichment research

on:
  push:
    branches:
      - pharmassist-enrichment-tmp-20260714
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and verify candidate products
        run: python3 scripts/pharmassist_research.py
      - name: Upload research artifact
        uses: actions/upload-artifact@v4
        with:
          name: pharmassist-enrichment-research
          path: pharmassist-output/
          if-no-files-found: error
          retention-days: 1
